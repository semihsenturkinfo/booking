<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Shoot Bookings</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--bg:#1a1a19;--bg2:#242422;--bg3:#1f1f1e;--text:#f0ede8;--text2:#9ca3af;--text3:#6b7280;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);--radius:10px;--rsm:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:2rem 1rem 4rem}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.btn{padding:10px 20px;border-radius:var(--rsm);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btnp{background:var(--text);color:var(--bg);border:none}.btnp:hover{opacity:.85}
.btns{background:none;border:1px solid var(--border2);color:var(--text)}.btns:hover{background:var(--bg2)}
.afilt{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:var(--rsm);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--text2);font-family:inherit;transition:all .1s}
.fb.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.bkcard{border:1px solid var(--border);border-radius:var(--rsm);padding:1rem 1.25rem;margin-bottom:8px;background:var(--bg)}
.bktop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.bkname{font-size:15px;font-weight:600}
.bkmeta{font-size:13px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;padding:3px 10px;border-radius:var(--rsm);font-size:12px;font-weight:500}
.bp{background:#292108;color:#fbbf24}.bc{background:#052e16;color:#34d399}.bx{background:#2d0a0a;color:#f87171}
.bacts{display:flex;gap:6px;align-items:center;margin-top:10px}
.bconf{padding:5px 12px;font-size:13px;background:#052e16;color:#34d399;border:1px solid #065f46;border-radius:var(--rsm);cursor:pointer;font-family:inherit;font-weight:500}
.bcanc{padding:5px 12px;font-size:13px;background:var(--bg2);color:var(--text2);border:1px solid var(--border2);border-radius:var(--rsm);cursor:pointer;font-family:inherit}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:14px}
.stgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:1.5rem}
.stc{background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);padding:.85rem 1rem}
.stl{font-size:12px;color:var(--text2);margin-bottom:4px}
.stv{font-size:22px;font-weight:600}
.mnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.mnav button{background:none;border:1px solid var(--border2);color:var(--text);border-radius:var(--rsm);padding:6px 12px;cursor:pointer;font-size:14px}
.mlbl{font-weight:600;font-size:15px}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ch{font-size:11px;color:var(--text3);text-align:center;padding:4px 0;font-weight:500}
.cd{font-size:13px;text-align:center;padding:8px 4px;border-radius:6px;cursor:pointer;position:relative;border:1px solid transparent}
.cd:hover{background:var(--bg2)}
.cd.tod{font-weight:700;border-color:var(--border2)}
.cd.sel{background:var(--text);color:var(--bg)}
.cd.pas{opacity:.3;cursor:default}
.cd.wknd{opacity:.4;cursor:default}
.cd.booked{border-color:#f59e0b}
.cd.partial{border-color:#f59e0b;opacity:.7}
.cd.admin-closed{background:#2d0a0a;color:#f87171}
.cd.emp{cursor:default}
.dot{display:none;width:4px;height:4px;border-radius:50%;background:var(--text2);opacity:.5;margin:2px auto 0}
.cd.partial .dot{display:block}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.lsw{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.ad-cal-wrap{display:grid;grid-template-columns:minmax(0,420px) 1fr;gap:1.5rem;align-items:start}
.ad-slot-panel{background:var(--bg2);border-radius:var(--radius);padding:1.1rem}
.ad-slot-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.ad-slot-row:last-child{border-bottom:none}
.toggle-btn{font-size:12px;padding:4px 10px;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:500;border:none}
.toggle-open{background:#052e16;color:#34d399}
.toggle-closed{background:#2d0a0a;color:#f87171}
.close-day-btn,.open-day-btn{width:100%;margin-top:10px;padding:8px;border-radius:var(--rsm);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;border:none}
.close-day-btn{background:#2d0a0a;color:#f87171}
.open-day-btn{background:#052e16;color:#34d399}
input,select{font-family:inherit;font-size:16px;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 10px;outline:none}
input:focus,select:focus{border-color:var(--text)}
</style>
</head>
<body>
<div class="wrap">
  <div style="margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
    <div>
      <h1 style="font-size:22px;font-weight:700;margin-bottom:4px">Admin Panel</h1>
      <p style="font-size:14px;color:var(--text2)">Manage bookings and availability</p>
    </div>
    <a href="index.html" style="font-size:13px;color:var(--text2);text-decoration:none;border:1px solid var(--border2);padding:6px 12px;border-radius:var(--rsm)">&#8592; View booking page</a>
  </div>

  <div class="card" style="margin-bottom:1rem">
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">Availability</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1.1rem">Click a day to manage its slots or close it entirely.</p>
    <div class="ad-cal-wrap">
      <div>
        <div class="mnav">
          <button onclick="adChMo(-1)">&#8592;</button>
          <span class="mlbl" id="ad-mlbl"></span>
          <button onclick="adChMo(1)">&#8594;</button>
        </div>
        <div class="cgrid" id="ad-cgrid"></div>
        <div class="legend">
          <div class="li"><div class="lsw" style="background:#2d0a0a;border:1px solid #f87171"></div>Admin closed</div>
          <div class="li"><div class="lsw" style="background:var(--bg);border:2px solid #f59e0b"></div>Has bookings</div>
        </div>
      </div>
      <div id="ad-slot-panel" style="display:none" class="ad-slot-panel"></div>
    </div>
  </div>

  <div id="wo-section"></div>

  <div style="font-size:15px;font-weight:600;margin-bottom:.75rem">Bookings</div>
  <div class="afilt">
    <button class="fb on" onclick="setF('all',this)">All</button>
    <button class="fb" onclick="setF('Pending',this)">Pending</button>
    <button class="fb" onclick="setF('Confirmed',this)">Confirmed</button>
    <button class="fb" onclick="setF('Cancelled',this)">Cancelled</button>
  </div>
  <div id="blist"></div>
  <div class="stgrid" id="stgrid"></div>
</div>

<script>
const API_SECRET = 'mK7pXn3qR9vL5wZ2';
const SLOTS = [{id:'a',lbl:'9:00 AM',block:'morning'},{id:'b',lbl:'10:00 AM',block:'morning'},{id:'c',lbl:'2:00 PM',block:'afternoon'},{id:'d',lbl:'3:00 PM',block:'afternoon'}];
const SLOT_LABEL_MAP = {'9:00 AM':'a','10:00 AM':'b','2:00 PM':'c','3:00 PM':'d'};
const MN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MNS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let st = {
  filt:'all',
  adVy:new Date().getFullYear(),
  adVm:new Date().getMonth(),
  adSd:null,
  notionBookings:[],
  blocked:{},
  wo:[]
};

function sv(){  localStorage.setItem('admin_blocked', JSON.stringify(st.blocked)); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0') }
function fmtD(d){ const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']; return dn[d.getDay()]+', '+MNS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear() }
function bookedSlots(ds){ return st.notionBookings.filter(b=>b.date===ds&&!b.isBlocked).map(b=>SLOT_LABEL_MAP[b.slot]).filter(Boolean) }
function adminBlocked(ds){ const b=st.blocked[ds]; return b?.ids||[] }

async function apiPost(body){
  const res = await fetch('/api/notion', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-secret':API_SECRET},
    body:JSON.stringify(body)
  });
  return res.json();
}

async function loadBookings(){
  try{
    const res = await fetch('/api/notion', {headers:{'x-api-secret':API_SECRET}});
    const data = await res.json();
    st.notionBookings = data.bookings||[];
    st.wo = (data.weekendOpen||[]).map(date=>({date}));
    st.blocked = JSON.parse(localStorage.getItem('admin_blocked')||'{}');
  }catch(e){ console.error('Load failed:',e); st.notionBookings=[]; }
}

function adChMo(d){ st.adVm+=d; if(st.adVm>11){st.adVm=0;st.adVy++} if(st.adVm<0){st.adVm=11;st.adVy--} renderAdCal() }

function renderAdCal(){
  document.getElementById('ad-mlbl').textContent = MN[st.adVm]+' '+st.adVy;
  const g = document.getElementById('ad-cgrid');
  g.innerHTML = '';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d=>{ const h=document.createElement('div');h.className='ch';h.textContent=d;g.appendChild(h) });
  const offset = (new Date(st.adVy,st.adVm,1).getDay()+6)%7;
  const dim = new Date(st.adVy,st.adVm+1,0).getDate();
  const tod = new Date(); tod.setHours(0,0,0,0);
  for(let i=0;i<offset;i++){ const e=document.createElement('div');e.className='cd emp';g.appendChild(e) }
  for(let i=1;i<=dim;i++){
    const d = new Date(st.adVy,st.adVm,i);
    const ds = fmt(d);
    const e = document.createElement('div');
    e.className = 'cd';
    e.textContent = i;
    if(d<tod) e.classList.add('pas');
    else if(d.getTime()===tod.getTime()) e.classList.add('tod');
    const bkd = bookedSlots(ds);
    const blk = adminBlocked(ds);
    if(blk.length>=SLOTS.length) e.classList.add('admin-closed');
    else if(bkd.length>0) e.classList.add('booked');
    if(!e.classList.contains('pas')) e.onclick = ()=>adSelDate(d);
    const dot = document.createElement('div'); dot.className='dot'; e.appendChild(dot);
    g.appendChild(e);
  }
}

function adSelDate(d){
  st.adSd = d;
  renderAdCal();
  const ds = fmt(d);
  const bkd = bookedSlots(ds);
  const adBlk = adminBlocked(ds);
  const allClosed = adBlk.length >= SLOTS.length;
  const panel = document.getElementById('ad-slot-panel');
  panel.style.display = 'block';
  const slotRows = SLOTS.map(s=>{
    const isClient = bkd.includes(s.id);
    const isAdminClosed = adBlk.includes(s.id);
    const isClosed = isClient||isAdminClosed;
    let btn = isClient
      ? '<span style="font-size:12px;color:var(--text3)">Client booked</span>'
      : isAdminClosed
        ? '<button class="toggle-btn toggle-open" onclick="adToggleSlot(\''+ds+'\',\''+s.id+'\',false)">Open</button>'
        : '<button class="toggle-btn toggle-closed" onclick="adToggleSlot(\''+ds+'\',\''+s.id+'\',true)">Close</button>';
    return '<div class="ad-slot-row"><span style="font-weight:500">'+s.lbl+(isClosed?'<span style="font-size:11px;color:var(--text3);margin-left:6px">'+(isClient?'booked':'closed')+'</span>':'')+'</span>'+btn+'</div>';
  }).join('');
  const dayBtn = allClosed
    ? '<button class="open-day-btn" onclick="adOpenDay(\''+ds+'\')">&#10003; Open entire day</button>'
    : '<button class="close-day-btn" onclick="adCloseDay(\''+ds+'\')">&#128683; Close entire day</button>';
  panel.innerHTML = '<div style="font-size:13px;font-weight:600;margin-bottom:10px">'+fmtD(d)+'</div>'+slotRows+dayBtn;
}

async function adToggleSlot(ds, slotId, close){
  const slotLbl = SLOTS.find(s=>s.id===slotId)?.lbl;
  if(close){
    const existing = st.blocked[ds];
    const currentIds = existing?.ids||[];
    const allIds = [...currentIds, slotId];
    const allLbls = allIds.map(id=>SLOTS.find(s=>s.id===id)?.lbl).filter(Boolean);
    if(existing?.pageId) await apiPost({action:'unblock', pageId:existing.pageId});
    const r = await apiPost({action:'block', date:ds, slot:allLbls});
    st.blocked[ds] = {ids:allIds, pageId:r.pageIds?.[0]};
  } else {
    const existing = st.blocked[ds];
    if(existing?.pageId) await apiPost({action:'unblock', pageId:existing.pageId});
    const remaining = (existing?.ids||[]).filter(x=>x!==slotId);
    if(remaining.length){
      const allLbls = remaining.map(id=>SLOTS.find(s=>s.id===id)?.lbl).filter(Boolean);
      const r = await apiPost({action:'block', date:ds, slot:allLbls});
      st.blocked[ds] = {ids:remaining, pageId:r.pageIds?.[0]};
    } else { delete st.blocked[ds]; }
  }
  sv(); renderAdCal(); adSelDate(new Date(ds+'T12:00:00'));
}

async function adCloseDay(ds){
  const existing = st.blocked[ds];
  const bookedIds = bookedSlots(ds);
  const openSlots = SLOTS.filter(s=>!bookedIds.includes(s.id));
  const allIds = openSlots.map(s=>s.id);
  const allLbls = openSlots.map(s=>s.lbl);
  if(existing?.pageId) await apiPost({action:'unblock', pageId:existing.pageId});
  const r = await apiPost({action:'block', date:ds, slot:allLbls});
  st.blocked[ds] = {ids:allIds, pageId:r.pageIds?.[0]};
  sv(); renderAdCal(); adSelDate(new Date(ds+'T12:00:00'));
}

async function adOpenDay(ds){
  const existing = st.blocked[ds];
  if(existing?.pageId) await apiPost({action:'unblock', pageId:existing.pageId});
  delete st.blocked[ds];
  sv(); renderAdCal(); adSelDate(new Date(ds+'T12:00:00'));
}

async function addWO(){
  const inp = document.getElementById('wo-input');
  const val = inp.value.trim();
  if(!val) return;
  const d = new Date(val+'T12:00:00');
  if(isNaN(d.getTime())){ alert('Invalid date'); return }
  if(d.getDay()!==0&&d.getDay()!==6){ alert("That's not a weekend day."); return }
  if(st.wo.find(x=>x.date===val)){ alert('Already open'); return }
  const r = await apiPost({action:'weekend_open', date:val});
  if(r.pageId){ st.wo.push({date:val, pageId:r.pageId}); renderAdCal(); renderAd() }
  inp.value='';
}
async function removeWO(ds){
  const entry = st.wo.find(x=>x.date===ds);
  if(entry?.pageId) await apiPost({action:'weekend_close', pageId:entry.pageId});
  st.wo = st.wo.filter(x=>x.date!==ds);
  renderAdCal(); renderAd();
}

function setF(f, btn){ st.filt=f; document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); renderAd() }

async function updSt(pageId, status){
  try{ await apiPost({action: status==='confirmed'?'confirm':'cancel', pageId}) }
  catch(e){ console.error('Update failed:',e) }
  await renderAd();
}

async function renderAd(){
  const list = document.getElementById('blist');
  list.innerHTML = '<div class="empty">Loading...</div>';
  try{
    const res = await fetch('/api/notion?full=1', {headers:{'x-api-secret':API_SECRET}});
    const data = await res.json();
    st.notionBookings = data.bookings||[];
  }catch(e){ console.error('Load failed:',e) }

  const all = st.notionBookings
    .filter(b=>!b.isBlocked)
    .sort((a,b)=>a.date.localeCompare(b.date));

  all.forEach(b=>{ if(!b.dateD&&b.date){ const d=new Date(b.date+'T12:00:00'); b.dateD=fmtD(d) } });

  const pend=all.filter(b=>b.status==='Pending');
  const conf=all.filter(b=>b.status==='Confirmed');
  const canc=all.filter(b=>b.status==='Cancelled');

  document.getElementById('stgrid').innerHTML =
    '<div class="stc"><div class="stl">Total</div><div class="stv">'+all.length+'</div></div>'+
    '<div class="stc"><div class="stl">Pending</div><div class="stv" style="color:#fbbf24">'+pend.length+'</div></div>'+
    '<div class="stc"><div class="stl">Confirmed</div><div class="stv" style="color:#34d399">'+conf.length+'</div></div>'+
    '<div class="stc"><div class="stl">Cancelled</div><div class="stv" style="color:#f87171">'+canc.length+'</div></div>';

  const woHtml = st.wo.length
    ? '<div style="display:flex;flex-wrap:wrap;gap:6px">'+st.wo.map(ds=>{
        const d=new Date(ds+'T12:00:00');
        return '<span style="display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px">'+fmtD(d)+'<button onclick="removeWO(\''+ds+'\')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px">&#x2715;</button></span>';
      }).join('')+'</div>'
    : '<p style="font-size:13px;color:var(--text3)">No weekend dates opened yet.</p>';

  document.getElementById('wo-section').innerHTML =
    '<div class="card" style="margin-bottom:1rem">'+
    '<div style="font-size:15px;font-weight:600;margin-bottom:6px">Weekend overrides</div>'+
    '<p style="font-size:13px;color:var(--text2);margin-bottom:12px">Open specific weekend dates for booking.</p>'+
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">'+
    '<input type="date" id="wo-input" style="width:180px" min="'+fmt(new Date())+'">'+
    '<button class="btn btns" style="padding:7px 14px;font-size:13px" onclick="addWO()">+ Open date</button></div>'+
    woHtml+'</div>';

  const filt = st.filt==='all' ? all : all.filter(b=>b.status===st.filt);
  if(!filt.length){ list.innerHTML='<div class="empty">No bookings here.</div>'; return }

  list.innerHTML = filt.map(b=>{
    const sk = b.status?.toLowerCase();
    return '<div class="bkcard">'+
      '<div class="bktop">'+
      '<div><div class="bkname">'+(b.name||'—')+'</div><div class="bkmeta">'+(b.email||'')+(b.phone?' &middot; '+b.phone:'')+'</div></div>'+
      '<span class="badge '+(sk==='pending'?'bp':sk==='confirmed'?'bc':'bx')+'">'+(b.status||'Pending')+'</span>'+
      '</div>'+
      '<div style="font-size:14px;margin-bottom:4px"><strong>'+(b.dateD||b.date)+'</strong> &mdash; '+b.slot+'</div>'+
      '<div style="font-size:13px;color:var(--text2);margin-bottom:2px">'+(b.pkg||'')+(b.orientation?' &middot; '+b.orientation:'')+'</div>'+
      '<div style="font-size:13px;color:var(--text2)">'+(b.addr||'')+(b.sqft?' &middot; '+b.sqft:'')+(b.lockbox?'<br><span style="color:var(--text3)">Access: '+b.lockbox+'</span>':'')+(b.notes?'<br><span style="color:var(--text3)">Notes: '+b.notes+'</span>':'')+'</div>'+
      '<div class="bacts">'+
      (sk==='pending'?'<button class="bconf" onclick="updSt(\''+b.pageId+'\',\'confirmed\')">&#10003; Confirm</button>':'')+
      (sk!=='cancelled'?'<button class="bcanc" onclick="updSt(\''+b.pageId+'\',\'cancelled\')">Cancel</button>':'<button class="bcanc" onclick="updSt(\''+b.pageId+'\',\'pending\')">Restore</button>')+
      '</div></div>';
  }).join('');
}

const EMAILJS_SERVICE = 'service_f5n8tgj';
const EMAILJS_TEMPLATE = 'template_1v0isbv';
const EMAILJS_KEY = 'q12N3BHMUohCjKnslhgh4';
emailjs.init(EMAILJS_KEY);

loadBookings().then(()=>{ renderAdCal(); renderAd(); });
</script>
</body>
</html>
