<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Shoot Bookings</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--bg:#fff;--bg2:#f5f5f4;--bg3:#fafaf9;--text:#1c1c1b;--text2:#6b7280;--text3:#9ca3af;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--radius:10px;--rsm:7px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a19;--bg2:#242422;--bg3:#1f1f1e;--text:#f0ede8;--text2:#9ca3af;--text3:#6b7280;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2)}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:2rem 1rem 4rem}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.btn{padding:10px 20px;border-radius:var(--rsm);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btnp{background:var(--text);color:var(--bg);border:none}.btnp:hover{opacity:.85}
.btns{background:none;border:1px solid var(--border2);color:var(--text)}.btns:hover{background:var(--bg2)}
.stgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stc{background:var(--bg2);border-radius:var(--rsm);padding:.85rem 1rem}
.stl{font-size:12px;color:var(--text2);margin-bottom:4px}
.stv{font-size:22px;font-weight:600}
.afilt{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.fb{padding:5px 12px;border-radius:var(--rsm);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:none;color:var(--text2);font-family:inherit;transition:all .1s}
.fb.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.bkcard{border:1px solid var(--border);border-radius:var(--rsm);padding:1rem 1.25rem;margin-bottom:8px;background:var(--bg)}
.bktop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.bkname{font-size:15px;font-weight:600}
.bkmeta{font-size:13px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;padding:3px 10px;border-radius:var(--rsm);font-size:12px;font-weight:500}
.bp{background:#fef3c7;color:#92400e}.bc{background:#d1fae5;color:#065f46}.bx{background:#fee2e2;color:#991b1b}
@media(prefers-color-scheme:dark){.bp{background:#292108;color:#fbbf24}.bc{background:#052e16;color:#34d399}.bx{background:#2d0a0a;color:#f87171}}
.bacts{display:flex;gap:6px;align-items:center;margin-top:10px}
.bconf{padding:5px 12px;font-size:13px;background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;border-radius:var(--rsm);cursor:pointer;font-family:inherit;font-weight:500}
.bconf:hover{background:#a7f3d0}
.bcanc{padding:5px 12px;font-size:13px;background:none;color:var(--text3);border:1px solid var(--border);border-radius:var(--rsm);cursor:pointer;font-family:inherit}
.bcanc:hover{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.mnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.mnav button{background:none;border:1px solid var(--border2);border-radius:var(--rsm);padding:5px 12px;cursor:pointer;color:var(--text);font-size:14px}
.mnav button:hover{background:var(--bg2)}
.mlbl{font-size:15px;font-weight:600}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ch{font-size:11px;color:var(--text3);text-align:center;padding:5px 0;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;border-radius:var(--rsm);cursor:pointer;border:1px solid transparent;transition:all .1s;color:var(--text);gap:2px}
.cd:hover:not(.emp){background:var(--bg2);border-color:var(--border2)}
.cd.sel{background:var(--text);color:var(--bg)}
.cd.today{border-color:var(--border2)}
.cd.admin-closed{background:#fee2e2;color:#991b1b}
.cd.admin-closed:hover{background:#fecaca}
.cd.admin-closed.sel{background:#991b1b;color:#fff}
.cd.emp{cursor:default}
.dot{display:none;width:4px;height:4px;border-radius:50%;background:var(--text2);opacity:.5}
.cd.partial .dot{display:block}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.lsw{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.ad-cal-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;align-items:start}
.ad-slot-panel{background:var(--bg2);border-radius:var(--radius);padding:1.1rem}
.ad-slot-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--border);font-size:14px}
.ad-slot-row:first-of-type{border-top:none;padding-top:0}
.toggle-btn{padding:4px 12px;font-size:12px;font-weight:500;border-radius:var(--rsm);cursor:pointer;font-family:inherit;transition:all .12s;border:1px solid}
.toggle-open{background:#d1fae5;color:#065f46;border-color:#6ee7b7}.toggle-open:hover{background:#a7f3d0}
.toggle-closed{background:#fee2e2;color:#991b1b;border-color:#fca5a5}.toggle-closed:hover{background:#fecaca}
.close-day-btn{width:100%;margin-top:12px;padding:8px;font-size:13px;font-weight:500;border-radius:var(--rsm);cursor:pointer;font-family:inherit;background:var(--bg);border:1px solid var(--border2);color:var(--text);transition:all .12s}
.close-day-btn:hover{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.open-day-btn{width:100%;margin-top:12px;padding:8px;font-size:13px;font-weight:500;border-radius:var(--rsm);cursor:pointer;font-family:inherit;background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;transition:all .12s}
.open-day-btn:hover{background:#a7f3d0}
input,select{font-family:inherit;font-size:14px;background:var(--bg);color:var(--text);border:1px solid var(--border2);border-radius:var(--rsm);padding:8px 10px;outline:none}
input:focus,select:focus{border-color:var(--text)}
@media(max-width:600px){
  .stgrid{grid-template-columns:repeat(2,1fr)}
  .ad-cal-wrap{grid-template-columns:1fr}
  .wrap{padding:1.25rem .75rem 3rem}
  .afilt{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .fb{white-space:nowrap}
  .cgrid{gap:2px}.cd{font-size:12px}.mnav button{padding:4px 8px;font-size:13px}
}
</style>
</head>
<body>
<div class="wrap">
  <div style="margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
    <div>
      <h1 style="font-size:22px;font-weight:700;margin-bottom:4px">Admin Panel</h1>
      <p style="font-size:14px;color:var(--text2)">Manage bookings and availability</p>
    </div>
    <a href="index.html" style="font-size:13px;color:var(--text2);text-decoration:none;border:1px solid var(--border2);padding:6px 12px;border-radius:var(--rsm)">&#8592; View booking page</a>
  </div>

  <div class="stgrid" id="stgrid"></div>

  <div class="card" style="margin-bottom:1rem">
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">Availability</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1.1rem">Click a day to manage its slots or close it entirely.</p>
    <div class="ad-cal-wrap">
      <div>
        <div class="mnav">
          <button onclick="adChMo(-1)">&#8592;</button>
          <span class="mlbl" id="ad-mlbl"></span>
          <button onclick="adChMo(1)">&#8594;</button>
        </div>
        <div class="cgrid" id="ad-cgrid"></div>
        <div class="legend">
          <div class="li"><div class="lsw" style="background:#fee2e2;border:1px solid #fca5a5"></div>Admin closed</div>
          <div class="li"><div class="lsw" style="background:var(--bg);border:2px solid #f59e0b"></div>Has bookings</div>
          <div class="li"><div class="lsw" style="background:var(--bg2);border:1px solid var(--border2);position:relative;overflow:hidden"><div style="position:absolute;top:50%;left:-2px;right:-2px;height:1px;background:var(--text3);transform:rotate(-20deg)"></div></div>Partial</div>
        </div>
      </div>
      <div id="ad-slot-panel" style="display:none"></div>
    </div>
  </div>

  <div id="wo-section"></div>

  <div style="font-size:15px;font-weight:600;margin-bottom:.75rem">Bookings</div>
  <div class="afilt">
    <button class="fb on" onclick="setF('all',this)">All</button>
    <button class="fb" onclick="setF('pending',this)">Pending</button>
    <button class="fb" onclick="setF('confirmed',this)">Confirmed</button>
    <button class="fb" onclick="setF('cancelled',this)">Cancelled</button>
  </div>
  <div id="blist"></div>
</div>

<script>
const SLOTS=[{id:'a',lbl:'9:00 AM',block:'morning'},{id:'b',lbl:'10:00 AM',block:'morning'},{id:'c',lbl:'2:00 PM',block:'afternoon'},{id:'d',lbl:'3:00 PM',block:'afternoon'}];
const SLOT_LABEL_MAP={'9:00 AM':'a','10:00 AM':'b','2:00 PM':'c','3:00 PM':'d'};
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MNS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let st={filt:'all',adVy:new Date().getFullYear(),adVm:new Date().getMonth(),adSd:null,notionBookings:[],wo:JSON.parse(localStorage.getItem('shoots_wo')||'[]'),blocked:JSON.parse(localStorage.getItem('shoots_blocked')||'{}')};
function sv(){localStorage.setItem('shoots_wo',JSON.stringify(st.wo));localStorage.setItem('shoots_blocked',JSON.stringify(st.blocked))}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtD(d){const dn=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];return dn[d.getDay()]+', '+MNS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear()}
function bookedSlots(ds){return st.notionBookings.filter(b=>b.date===ds).map(b=>SLOT_LABEL_MAP[b.slot]).filter(Boolean)}
function adminBlocked(ds){return st.blocked[ds]||[]}

async function loadBookings(){
  try{
    const res=await fetch('/api/notion');
    const data=await res.json();
    st.notionBookings=data.bookings||[];
  }catch(e){console.error('Failed to load:',e);st.notionBookings=[];}
}

async function loadFullBookings(){
  try{
    const res=await fetch('/api/notion?full=1');
    const data=await res.json();
    return data.bookings||[];
  }catch(e){console.error('Failed:',e);return[];}
}

function adChMo(d){st.adVm+=d;if(st.adVm>11){st.adVm=0;st.adVy++}if(st.adVm<0){st.adVm=11;st.adVy--}renderAdCal()}

function renderAdCal(){
  document.getElementById('ad-mlbl').textContent=MN[st.adVm]+' '+st.adVy;
  const g=document.getElementById('ad-cgrid');g.innerHTML='';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d=>{const h=document.createElement('div');h.className='ch';h.textContent=d;g.appendChild(h)});
  const offset=(new Date(st.adVy,st.adVm,1).getDay()+6)%7;
  const dim=new Date(st.adVy,st.adVm+1,0).getDate();
  const tod=new Date();tod.setHours(0,0,0,0);
  for(let i=0;i<offset;i++){const e=document.createElement('div');e.className='cd emp';g.appendChild(e)}
  for(let d=1;d<=dim;d++){
    const el=document.createElement('div');el.className='cd';
    const td=new Date(st.adVy,st.adVm,d);const ds=fmt(td);
    const bkd=bookedSlots(ds);const adBlk=adminBlocked(ds);
    const ns=document.createElement('span');ns.textContent=d;el.appendChild(ns);
    const dot=document.createElement('div');dot.className='dot';el.appendChild(dot);
    if(adBlk.length>=SLOTS.length)el.classList.add('admin-closed');
    else if(bkd.length>0){el.style.borderColor='#f59e0b';el.style.borderWidth='2px'}
    if(adBlk.length>0&&adBlk.length<SLOTS.length)el.classList.add('partial');
    el.onclick=()=>adSelDate(td);
    if(st.adSd&&fmt(st.adSd)===ds)el.classList.add('sel');
    if(fmt(td)===fmt(tod))el.classList.add('today');
    g.appendChild(el);
  }
}

function adSelDate(d){
  st.adSd=d;renderAdCal();
  const ds=fmt(d);const bkd=bookedSlots(ds);const adBlk=adminBlocked(ds);
  const allClosed=adBlk.length>=SLOTS.length;
  const panel=document.getElementById('ad-slot-panel');panel.style.display='block';
  const slotRows=SLOTS.map(s=>{
    const isClient=bkd.includes(s.id);const isAdminClosed=adBlk.includes(s.id);const isClosed=isClient||isAdminClosed;
    let btn=isClient?'<span style="font-size:12px;color:var(--text3)">Client booked</span>':isAdminClosed?'<button class="toggle-btn toggle-open" onclick="adToggleSlot(\''+ds+'\',\''+s.id+'\',false)">Open</button>':'<button class="toggle-btn toggle-closed" onclick="adToggleSlot(\''+ds+'\',\''+s.id+'\',true)">Close</button>';
    return'<div class="ad-slot-row"><span style="font-weight:500">'+s.lbl+(isClosed?'<span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:6px">'+(isClient?'booked':'closed')+'</span>':'')+'</span>'+btn+'</div>';
  }).join('');
  const dayBtn=allClosed?'<button class="open-day-btn" onclick="adOpenDay(\''+ds+'\')">&#10003; Open entire day</button>':'<button class="close-day-btn" onclick="adCloseDay(\''+ds+'\')">&#128683; Close entire day</button>';
  panel.innerHTML='<div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text)">'+fmtD(d)+'</div>'+slotRows+dayBtn;
}

function adToggleSlot(ds,slotId,close){
  if(!st.blocked[ds])st.blocked[ds]=[];
  if(close){if(!st.blocked[ds].includes(slotId))st.blocked[ds].push(slotId)}
  else{st.blocked[ds]=st.blocked[ds].filter(x=>x!==slotId)}
  if(st.blocked[ds].length===0)delete st.blocked[ds];
  sv();renderAdCal();if(st.adSd&&fmt(st.adSd)===ds)adSelDate(st.adSd);
}
function adCloseDay(ds){st.blocked[ds]=SLOTS.map(s=>s.id);sv();renderAdCal();if(st.adSd&&fmt(st.adSd)===ds)adSelDate(st.adSd)}
function adOpenDay(ds){delete st.blocked[ds];sv();renderAdCal();if(st.adSd&&fmt(st.adSd)===ds)adSelDate(st.adSd)}

const EMAILJS_SERVICE = 'service_f5n8tgj';
const EMAILJS_TEMPLATE = 'template_1v0isbv';
const EMAILJS_KEY = 'q12N3BHMUohCjKnslhgh4';

function setF(f,btn){st.filt=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderAd()}

async function updSt(id, status){
  const b = st.bk.find(b => b.id === id);
  if (!b) return;
  b.status = status;
  sv();
  renderAd();

  if (status === 'confirmed') {
    // Update Notion status
    if (b.notionPageId) {
      try {
        await fetch('/api/notion', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({action:'confirm', pageId: b.notionPageId})
        });
      } catch(e) { console.error('Notion confirm failed:', e); }
    }

    // Send confirmation email via EmailJS
    try {
      await emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
        client_name: b.name,
        client_email: b.email,
        package: b.pkg,
        date: b.dateD,
        time: b.slot,
        address: b.addr,
        sqft: b.sqft || '—',
        orientation: b.orientation || '—',
        lockbox: b.lockbox || '—',
        notes: b.notes || '—',
      });
      alert('Confirmation email sent to ' + b.email);
    } catch(e) {
      console.error('EmailJS failed:', e);
      alert('Booking confirmed but email failed: ' + e.text);
    }
  }
}

async function updSt(pageId, status){
  // Update Notion
  try{
    await fetch('/api/notion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:status==='confirmed'?'confirm':'cancel',pageId})});
  }catch(e){console.error('Notion update failed:',e)}

  if(status==='confirmed'){
    // Find booking details for email
    const b=st.notionBookings.find(b=>b.pageId===pageId);
    if(b){
      try{
        await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
          client_name:b.name,client_email:b.email,package:b.pkg,
          date:b.dateD||b.date,time:b.slot,address:b.addr,
          sqft:b.sqft||'—',orientation:b.orientation||'—',
          lockbox:b.lockbox||'—',notes:b.notes||'—',
        });
        alert('Confirmation email sent to '+b.email);
      }catch(e){alert('Booking confirmed but email failed: '+(e.text||e.message))}
    }
  }
  // Reload from Notion
  await renderAd();
}

function addWO(){
  const inp=document.getElementById('wo-input');const val=inp.value.trim();if(!val)return;
  const d=new Date(val+'T12:00:00');if(isNaN(d.getTime())){alert('Invalid date');return}
  if(d.getDay()!==0&&d.getDay()!==6){alert('That\'s not a weekend day.');return}
  if(!st.wo.includes(val)){st.wo.push(val);sv();renderAdCal();renderAd()}inp.value='';
}
function removeWO(ds){st.wo=st.wo.filter(x=>x!==ds);sv();renderAdCal();renderAd()}

async function renderAd(){
  // Load full bookings from Notion
  const list=document.getElementById('blist');
  list.innerHTML='<div class="empty">Loading...</div>';
  try{
    const res=await fetch('/api/notion?full=1');
    const data=await res.json();
    st.notionBookings=data.bookings||[];
  }catch(e){console.error('Load failed:',e)}

  const all=st.notionBookings.sort((a,b)=>a.date.localeCompare(b.date));
  // Add formatted date display
  all.forEach(b=>{if(!b.dateD&&b.date){const d=new Date(b.date+'T12:00:00');b.dateD=fmtD(d);}});
  const pend=all.filter(b=>b.status==='Pending'),conf=all.filter(b=>b.status==='Confirmed'),canc=all.filter(b=>b.status==='Cancelled');
  document.getElementById('stgrid').innerHTML=
    '<div class="stc"><div class="stl">Total</div><div class="stv">'+all.length+'</div></div>'+
    '<div class="stc"><div class="stl">Pending</div><div class="stv" style="color:#b45309">'+pend.length+'</div></div>'+
    '<div class="stc"><div class="stl">Confirmed</div><div class="stv" style="color:#065f46">'+conf.length+'</div></div>'+
    '<div class="stc"><div class="stl">Cancelled</div><div class="stv" style="color:#991b1b">'+canc.length+'</div></div>';
  const woHtml=st.wo.length?'<div style="display:flex;flex-wrap:wrap;gap:6px">'+st.wo.map(ds=>{const d=new Date(ds+'T12:00:00');return'<span style="display:inline-flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:13px">'+fmtD(d)+'<button onclick="removeWO(\''+ds+'\')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;line-height:1">&#x2715;</button></span>'}).join('')+'</div>':'<p style="font-size:13px;color:var(--text3)">No weekend dates opened yet.</p>';
  document.getElementById('wo-section').innerHTML='<div class="card" style="margin-bottom:1rem"><div style="font-size:15px;font-weight:600;margin-bottom:6px">Weekend overrides</div><p style="font-size:13px;color:var(--text2);margin-bottom:12px">Open specific weekend dates for booking.</p><div style="display:flex;gap:8px;align-items:center;margin-bottom:12px"><input type="date" id="wo-input" style="width:180px" min="'+fmt(new Date())+'"><button class="btn btns" style="padding:7px 14px;font-size:13px" onclick="addWO()">+ Open date</button></div>'+woHtml+'</div>';
  const filt=st.filt==='all'?all:all.filter(b=>b.status.toLowerCase()===st.filt);
  if(!filt.length){list.innerHTML='<div class="empty">No bookings here.</div>';return}
  list.innerHTML=filt.map(b=>{
    const statusKey=b.status.toLowerCase();
    return'<div class="bkcard"><div class="bktop">'+
    '<div><div class="bkname">'+b.name+'</div><div class="bkmeta">'+b.email+' &middot; '+b.phone+'</div></div>'+
    '<span class="badge '+(statusKey==='pending'?'bp':statusKey==='confirmed'?'bc':'bx')+'">'+b.status+'</span></div>'+
    '<div style="font-size:14px;margin-bottom:4px"><strong>'+(b.dateD||b.date)+'</strong> &mdash; '+b.slot+'</div>'+
    '<div style="font-size:13px;color:var(--text2);margin-bottom:2px">'+b.pkg+(b.orientation?' &middot; '+b.orientation:'')+'</div>'+
    '<div style="font-size:13px;color:var(--text2)">'+b.addr+(b.sqft?' &middot; '+b.sqft:'')+(b.lockbox?'<br><span style="color:var(--text3)">Access: '+b.lockbox+'</span>':'')+(b.notes?'<br><span style="color:var(--text3)">Notes: '+b.notes+'</span>':'')+'</div>'+
    '<div class="bacts">'+
    (statusKey==='pending'?'<button class="bconf" onclick="updSt(\''+b.pageId+'\',\'confirmed\')">&#10003; Confirm</button>':'')+
    (statusKey!=='cancelled'?'<button class="bcanc" onclick="updSt(\''+b.pageId+'\',\'cancelled\')">Cancel</button>':'<button class="bcanc" onclick="updSt(\''+b.pageId+'\',\'pending\')">Restore</button>')+
    '</div></div>';
  }).join('');
}
